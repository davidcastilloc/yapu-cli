<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YapuCli - Context Engineering Framework</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Framework de ingeniería de contexto y memoria estática para LLMs">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Beautiful dark theme from docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  
  <style>
    :root {
      /* Custom Yapu Branding */
      --theme-color: #f39c12;
      --base-font-size: 16px;
      --heading-color: #f1c40f;
      --sidebar-background: #111;
      --code-block-background: #000;
      --code-font-family: 'Fira Code', Consolas, Monaco, monospace;
    }
    
    body {
      background-color: #1a1a1a;
      color: #eaeaea;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .app-name-link img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    /* Subtle glow for links */
    a {
      transition: all 0.2s ease;
    }
    a:hover {
      text-shadow: 0 0 8px rgba(243, 156, 18, 0.4);
    }
  </style>
</head>
<body>
  <div id="app">Cargando el cerebro de Yapu...</div>
  
  <script>
    window.$docsify = {
      name: 'YapuCli 🪺',
      repo: 'davidcastilloc/yapu-cli',
      loadSidebar: true,
      subMaxLevel: 2,
      themeColor: '#f39c12',
      auto2top: true,
      fallbackLanguages: ['es', 'en'],
      logo: 'https://raw.githubusercontent.com/davidcastilloc/yapu-cli/main/yapu-banner.png',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: {
          '/': 'Buscar',
          '/en/': 'Search'
        },
        noData: {
          '/': 'No hay resultados!',
          '/en/': 'No results!'
        }
      },
      copyCode: {
        buttonText : {
          '/': 'Copiar al portapapeles',
          '/en/': 'Copy to clipboard'
        },
        errorText  : {
          '/': 'Error',
          '/en/': 'Error'
        },
        successText: {
          '/': 'Copiado',
          '/en/': 'Copied'
        }
      }
    }
  </script>
  
  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
